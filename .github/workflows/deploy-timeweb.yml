name: Deploy to Timeweb VPS

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.TIMEWEB_HOST }}
          username: ${{ secrets.TIMEWEB_USER }}
          key: ${{ secrets.TIMEWEB_SSH_KEY }}
          passphrase: ${{ secrets.TIMEWEB_SSH_PASSPHRASE }}
          port: ${{ secrets.TIMEWEB_PORT }}
          script_stop: true
          script: |
            set -e
            cd /opt/research-vault/app
            git fetch origin main
            git reset --hard origin/main

            # Avoid OOM on small VPS during npm install/build.
            if ! swapon --show | grep -q '/swapfile'; then
              if command -v fallocate >/dev/null 2>&1; then
                fallocate -l 2G /swapfile
              else
                dd if=/dev/zero of=/swapfile bs=1M count=2048
              fi
              chmod 600 /swapfile
              mkswap /swapfile
              swapon /swapfile
            fi

            npm ci --no-audit --no-fund
            NODE_OPTIONS=--max-old-space-size=768 npm run build
            cd apps/api
            npx prisma db push
            cd ../..
            pm2 restart research-api
